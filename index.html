<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Preço para Marketplace</title>
<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.calculator{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
width:340px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.equation{
font-size:13px;
text-align:center;
margin-bottom:20px;
color:#666;
}

label{
font-weight:bold;
font-size:14px;
}

input{
width:100%;
padding:9px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a68d1;
}

.result{
margin-top:18px;
padding:12px;
background:#eef3ff;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.footer{
margin-top:12px;
font-size:11px;
text-align:center;
color:#777;
}
</style>
</head>
<body>

<div class="calculator">

<h2>Calculadora de Preço</h2>

<div class="equation">
Equação utilizada:<br>
P = (C + F) / (1 - T - V)
</div>

<label>Custo do produto (C)</label>
<input type="number" id="c" step="0.01" placeholder="Ex: 57">

<label>Frete (F)</label>
<input type="number" id="f" step="0.01" placeholder="Ex: 20">

<label>Taxa do marketplace % (T)</label>
<input type="number" id="t" step="0.01" placeholder="Ex: 12">

<label>Minha comissão % (V)</label>
<input type="number" id="v" step="0.01" placeholder="Ex: 25">

<button onclick="calcularPreco()">Calcular Preço</button>

<div class="result" id="resultado">Preço do produto (P): --</div>

<div class="footer">
Informe T e V em porcentagem
</div>

</div>

<script>

function calcularPreco(){

let c = parseFloat(document.getElementById('c').value);
let f = parseFloat(document.getElementById('f').value);
let t = parseFloat(document.getElementById('t').value);
let v = parseFloat(document.getElementById('v').value);

if(isNaN(c) || isNaN(f) || isNaN(t) || isNaN(v)){
alert("Preencha todos os campos");
return;
}

// converter porcentagem para decimal
let tDecimal = t / 100;
let vDecimal = v / 100;

let denominador = 1 - tDecimal - vDecimal;

if(denominador <= 0){
alert("Taxa + Comissão não podem ser maiores ou iguais a 100%.");
return;
}

let p = (c + f) / denominador;

let precoFinal = p.toFixed(2);

document.getElementById('resultado').innerHTML = "Preço do produto (P): R$ " + precoFinal;

}

</script>

</body>
</html>
